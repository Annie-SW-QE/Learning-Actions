name: learn-workflows
on: 
  push:
    branches:
    - main
jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout and echo new filename
        uses: actions/checkout@v5
        with: 
          fetch-depth: 2
      - name: Show filename
        
        run: echo $(git diff --name-only HEAD^)
      - name: Set file list
        id: file-list
        run: |
            if [[ "${{ github.event_name }}" == "push" ]]; then
            # For push events, compare against the previous commit in the branch
            files=$(git diff --name-only --diff-filter=ACMRTUXB "${{ github.event.before }}" "${{ github.sha }}")
            fi
            
            
            for file in ${files}; do
                echo "file=$file" 
                #check file extension and save as output var for each, e.g. .py = python script, .txt = dependencies list
                if: contains(file,'.py)
                echo "python-script=$file" >> GITHUB_OUTPUT
                # if: ${{contains($file,'.txt')}}
                # echo "dependencies=$file" >> GITHUB_OUTPUT
            done
            
        shell: bash
      - name: Check output
        run: echo "The output is:${{ steps.file-list.outputs.file}}"
      
      
  build: 
    needs: setup
    runs-on: ubuntu-latest
    steps:
          - name: Setup python environment
            uses: actions/setup-python@v6
            with:
                python-version: '3.13'
