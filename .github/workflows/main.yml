name: Work Tasks
run-name: Work Task Test
on:
  push:
    branches:
      - 'Workflow-Testing/**'
jobs:
   setup:
     runs-on: windows-latest
     steps:
       ## checkout repo
       - name: Checkout repo and file types
       - uses: actions/checkout@v5
         with:
           fetch-depth: 2
       ## store actor name as env for later use -- ${{github.triggering_actor}}
       
       ## check file types
       - name: Check file types and set up for language
         run: |
           changed_files = $(git diff --name-only HEAD^ HEAD)
           echo "Files changed in the latest push:"
           for file in $changed_files; do
             filename=$(basename "$file")
             extension="${filename##*.}"
             if [["$filename"== *>*]]; then
               echo "  - $file (Type: $extension)"
              else
                echo "  - $file (Type: No extension or directory)"
              fi
            done
     
     ## install dependencies
    run-script:
      ### run the script

    notify:
      # notifies user
