name: learn-workflows
on: 
  push:
    branches:
    - main
jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout and echo new filename
        uses: actions/checkout@v5
        with: 
          fetch-depth: 2
      - name: Show filename and set
        id:  set_name
        run: |  
          echo $(git diff --name-only HEAD^)
          
          "script_name=$(git diff --name-only HEAD^)}" >>"$GITHUB_OUTPUT"
          
          

        
