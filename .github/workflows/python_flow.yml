name: python-script-manager
on: 
  push:
    branches:
    - python-only
    paths-ignore:
    - ".github/workflows/**"
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      pyfiles: ${{steps.file-list.outputs.pyfiles}}
      # req_files: ${{steps.file-list.outputs.req_files}}
    steps:
      - name: Checkout and echo new filename
        uses: actions/checkout@v5
        with: 
          fetch-depth: 2
      - name: Show filename
        
        run: echo $(git diff --name-only HEAD^)
      - name: Set file list
        id: file-list
     
        run: |
            if [[ "${{ github.event_name }}" == "push" ]]; then
            # For push events, compare against the previous commit in the branch
            changedfiles=$(git diff --name-only --diff-filter=AM "${{ github.event.before }}" "${{ github.sha }}")
            echo "$changedfiles"
            # YML_FILES=$(echo "$changedfiles" | grep '\.yml$')
            # echo "yaml_files=$YML_FILES" >> $GITHUB_OUTPUT
            PY_FILES=$(echo "$changedfiles" | grep '\.py$')
            echo "$PY_FILES"
            echo "pyfiles=$PY_FILES" >> $GITHUB_OUTPUT
            
            # REQ_FILES=$(echo "$changedfiles" | grep '\.py$')
            # echo "req_files=$REQ_FILES" >> $GITHUB_OUTPUT
            
            fi
            
            
    
            
        # shell: bash
        
          
      - name: Check output
        run: echo "The output is:${{steps.file-list.outputs.pyfiles}}"
      
      
  build: 
    needs: setup
    runs-on: ubuntu-latest
    steps:
    - name: Setup Python
      
      uses: actions/setup-python@v6
      with:
            python-version: '3.13'
          # - name: Install dependencies
            ## grab requirements text from output
    
    - name: Echo Output
      id: get_file_name
      run: |
        echo "retrieved file is:${{needs.setup.outputs.pyfiles}}" 
        echo "filename=${{needs.setup.outputs.pyfiles}}" >> $GITHUB_OUTPUT
        echo "current wd: ${{ github.workspace}}"
    - name: checkout again
      uses: actions/checkout@v5
      with: 
          fetch-depth: 2
    - name: Make dir
      run: mkdir artifacts
    - name: Run script
      run: python ${{steps.get_file_name.outputs.filename}}
    - name: find files
      run: ls -la
    # - name: Upload artifacts
      # uses: actions/upload-artifact@v4
      # with:
      #   name: test-artifact
      #   path: ./artifacts
      
        
