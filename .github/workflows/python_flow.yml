name: python-script-manager
on: 
  push:
    branches:
    - python-only
    paths-ignore:
    - ".github/workflows/**"
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      pyfiles: ${{steps.file-list.outputs.pyfiles}}
      reqfiles: ${{steps.file-list.outputs.reqfiles}}
    steps:
      - name: Checkout and echo new filename
        uses: actions/checkout@v5
        with: 
          fetch-depth: 1
      - name: Show filename
        
        run: echo $(git diff --name-only HEAD^)
      - name: Set file list
        id: file-list
     
        run: |
            if [[ "${{ github.event_name }}" == "push" ]]; then
            # For push events, compare against the previous commit in the branch
            changedfiles=$(git diff --name-only --diff-filter=AM "${{ github.event.before }}" "${{ github.sha }}")
            echo "$changedfiles"
            # YML_FILES=$(echo "$changedfiles" | grep '\.yml$')
            # echo "yaml_files=$YML_FILES" >> $GITHUB_OUTPUT
            PY_FILES=$(echo "$changedfiles" | grep '\.py$')
            echo "$PY_FILES"
            echo "pyfiles=$PY_FILES" >> $GITHUB_OUTPUT
            
            REQ_FILES=$(echo "$changedfiles" | grep '\.py$')
            echo "reqfiles=$REQ_FILES" >> $GITHUB_OUTPUT
            
            fi
            
            
    
            
        # shell: bash
        
          
      - name: Check output
        run: |
              echo "The output is:${{steps.file-list.outputs.pyfiles}}"
              echo "The output is:${{steps.file-list.outputs.reqfiles}}"
        
      
      
  build: 
    needs: setup
    runs-on: ubuntu-latest
    steps:
    - name: Setup Python
      
      uses: actions/setup-python@v6
      with:
            python-version: '3.13'
          
    
    - name: Echo Output
      id: get_file_name
      run: |
        echo "retrieved file is:${{needs.setup.outputs.pyfiles}}" 
        echo "retrieved file is:${{needs.setup.outputs.reqfiles}}" 
        echo "pyfilename=${{needs.setup.outputs.pyfiles}}" >> $GITHUB_OUTPUT
        echo "reqfilename=${{needs.setup.outputs.reqfiles}}" >> $GITHUB_OUTPUT
        echo "current wd: ${{ github.workspace}}"
    - name: checkout again
      uses: actions/checkout@v5
      with: 
          fetch-depth: 2
    - name: Install dependencies
            # grab requirements text from output
      run: |
            pip install -r ${{steps.get_file_name.outputs.reqfilename}}
                  
            
    - name: Run script
      run: python ${{steps.get_file_name.outputs.pyfilename}}
    - name:  List artifacts dir
      run: | 
            
            cd artifacts
            ls -la
    # - name: find files
    #   run: |
    #         ls -la
    #         pwd
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: test-artifact
        path: artifacts
      
        
